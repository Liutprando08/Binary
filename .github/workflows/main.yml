name: Update Velora binaries

on:
  schedule:
    - cron: '0 */6 * * *'

  repository_dispatch:
    types: [velora-release]
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-sync even if the Velora version is unchanged'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-velora-binaries
  cancel-in-progress: false

env:
  VELORA_REPO: AstraeLabs/Velora
  VELORA_TAG: init
  VERSION_FILE: binaries/velora.version

jobs:
  check:
    name: Check for a new Velora version
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.cmp.outputs.changed }}
      version: ${{ steps.cmp.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest vs published version
        id: cmp
        env:
          GH_TOKEN: ${{ secrets.VELORA_RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Canonical "latest" = the [package] version in Velora's Cargo.toml on main.
          # This is the exact value VibraVid compares against, so syncing on it keeps
          # the published binary from ever drifting behind what clients expect.
          latest="$(gh api "repos/${VELORA_REPO}/contents/Cargo.toml" --jq '.content' \
                    | tr -d '\n' | base64 -d \
                    | awk -F'"' '/^[[:space:]]*version[[:space:]]*=/{print $2; exit}')"
          if [ -z "$latest" ]; then
            echo "::error::Could not parse the version from ${VELORA_REPO} Cargo.toml"
            exit 1
          fi

          current=""
          [ -f "$VERSION_FILE" ] && current="$(tr -d '[:space:]' < "$VERSION_FILE")"

          echo "Velora latest=$latest  published=${current:-<none>}"
          echo "version=$latest" >> "$GITHUB_OUTPUT"

          if [ "$latest" != "$current" ] \
             || [ "${{ github.event.inputs.force }}" = "true" ] \
             || [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date — nothing to do."
          fi

  update:
    name: Pull, verify & commit Velora binaries
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Velora release assets
        env:
          GH_TOKEN: ${{ secrets.VELORA_RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .velora-dl

          gh release download "$VELORA_TAG" \
            --repo "$VELORA_REPO" \
            --dir  .velora-dl \
            --pattern 'velora-win-x64.exe' \
            --pattern 'velora-win-arm64.exe' \
            --pattern 'velora-osx-x64' \
            --pattern 'velora-osx-arm64' \
            --pattern 'velora-linux-x64' \
            --pattern 'velora-linux-arm64' \
            --pattern 'velora-linux-musl-x64' \
            --clobber

          echo "── Downloaded ──"
          ls -lh .velora-dl/

      - name: Verify asset version matches Cargo.toml
        env:
          EXPECTED: ${{ needs.check.outputs.version }}
        run: |
          set -euo pipefail

          # Guard against the failure mode that caused the per-startup re-download
          # loop: Cargo.toml bumped but the release asset still being the old build.
          # The binary prints e.g. {"event":"version","name":"Velora","version":"2.0.3"}.
          chmod +x .velora-dl/velora-linux-x64
          reported="$(.velora-dl/velora-linux-x64 --version \
                      | python3 -c 'import sys, json; print(json.loads(sys.stdin.readline()).get("version",""))')"

          echo "asset reports: $reported   expected: $EXPECTED"
          if [ "$reported" != "$EXPECTED" ]; then
            echo "::error::Release asset reports '$reported' but Cargo.toml is '$EXPECTED'. \
          Refusing to publish a mismatched binary — the Velora release build is likely still in flight. \
          This run will retry on the next schedule."
            exit 1
          fi

      - name: Place binaries in the correct folders
        run: |
          set -euo pipefail

          # asset_name → destination inside binaries/
          declare -A MAP=(
            ["velora-win-x64.exe"]="binaries/windows/x64/velora/velora.exe"
            ["velora-win-arm64.exe"]="binaries/windows/arm64/velora/velora.exe"
            ["velora-osx-x64"]="binaries/darwin/x64/velora/velora"
            ["velora-osx-arm64"]="binaries/darwin/arm64/velora/velora"
            ["velora-linux-x64"]="binaries/linux/x64/velora/velora"
            ["velora-linux-arm64"]="binaries/linux/arm64/velora/velora"
            ["velora-linux-musl-x64"]="binaries/linux/x64/velora_musl/velora"
          )

          for asset in "${!MAP[@]}"; do
            dst="${MAP[$asset]}"
            src=".velora-dl/${asset}"

            if [ ! -f "$src" ]; then
              echo "::error::Missing asset $asset in release $VELORA_TAG"
              exit 1
            fi

            mkdir -p "$(dirname "$dst")"
            install -m 755 "$src" "$dst"
            echo "  $asset → $dst"
          done

          rm -rf .velora-dl

          echo "── Placed ──"
          find binaries -type d -name 'velora*' -exec ls -lh {} +

      - name: Record published version
        run: echo "${{ needs.check.outputs.version }}" > "$VERSION_FILE"

      - name: Commit & push
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain binaries)" ]; then
            echo "No changes — binaries already up to date."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add binaries
          git commit -m "chore(velora): sync binaries to v${{ needs.check.outputs.version }} from ${VELORA_REPO}@${VELORA_TAG}

          Triggered by ${{ github.event_name }} (actor: @${{ github.actor }})."
          git push

          echo "### Velora binaries synced to v${{ needs.check.outputs.version }} :rocket:" >> "$GITHUB_STEP_SUMMARY"